spring:
  application:
    name: lark-agent
  main:
    web-application-type: none

logging:
  level:
    root: INFO
    com.cryptopanghu.larkagent: INFO

lark:
  agent:
    app-id: xxx
    app-secret: xxx
    domain: "https://open.larksuite.com"
    require-mention: true
    respond-to-mention-all: false
    group-allow-list:
server:
  port: 8080


gemini:
  api-key: xxxx
  model: gemini-2.5-flash-lite
  base-url: https://generativelanguage.googleapis.com
  system-prompt: |
    你是 Lark 群聊里的智能助手。
    请始终使用简体中文回答。
    回答简洁、直接、清晰。
    如果信息不足，请明确说明，不要编造。
